<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC - Rusya-Ukrayna Savaşı Haberleri 🇺🇦</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0c10;
            color: #e8eaed;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1d23 0%, #0f1117 100%);
            border-bottom: 1px solid #2a2d35;
            padding: 24px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bbc-logo {
            background: #fff;
            color: #000;
            font-weight: 800;
            font-size: 22px;
            padding: 6px 14px;
            border-radius: 4px;
            letter-spacing: -0.5px;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 700;
            color: #f0f2f5;
        }

        .logo-text span {
            font-size: 13px;
            color: #9aa0a8;
            font-weight: 400;
        }

        .flag-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            color: #9aa0a8;
        }

        .flag-badge .live {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #e74c3c;
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* Stats Bar */
        .stats-bar {
            background: #14171e;
            border-bottom: 1px solid #1e2128;
            padding: 16px 0;
        }

        .stats-grid {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #f0f2f5;
            margin-top: 2px;
        }

        .stat-value.warn { color: #e74c3c; }
        .stat-value.info { color: #3498db; }

        /* Section */
        .section {
            padding: 32px 0;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #9aa0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .count {
            background: #1e2128;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 12px;
            color: #6b7280;
        }

        /* News Grid */
        .news-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* News Card */
        .news-card {
            background: #14171e;
            border: 1px solid #1e2128;
            border-radius: 12px;
            padding: 20px 24px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .news-card:hover {
            border-color: #2a2d35;
            background: #181b23;
            transform: translateX(4px);
        }

        .news-card-content {
            flex: 1;
            min-width: 0;
        }

        .news-card-title {
            font-size: 17px;
            font-weight: 600;
            color: #f0f2f5;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .news-card-title a {
            color: inherit;
            text-decoration: none;
        }

        .news-card-title a:hover {
            color: #3498db;
        }

        .news-card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #6b7280;
        }

        .news-card-meta .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .tag-diplomacy { background: rgba(52, 152, 219, 0.15); color: #3498db; }
        .tag-battlefield { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }
        .tag-analysis { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
        .tag-tech { background: rgba(155, 89, 182, 0.15); color: #9b59b6; }
        .tag-world { background: rgba(241, 196, 15, 0.15); color: #f1c40f; }
        .tag-economy { background: rgba(230, 126, 34, 0.15); color: #e67e22; }

        .news-card-time {
            white-space: nowrap;
            font-size: 13px;
            color: #6b7280;
        }

        /* Featured Card */
        .news-card.featured {
            background: linear-gradient(135deg, #1a1f2e 0%, #14171e 100%);
            border-color: #2a3a5e;
        }

        .news-card.featured:hover {
            border-color: #3498db;
        }

        .featured-badge {
            display: inline-block;
            background: #e74c3c;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .news-card.featured .news-card-title {
            font-size: 20px;
        }

        /* Footer */
        .footer {
            border-top: 1px solid #1e2128;
            padding: 24px 0;
            text-align: center;
            color: #6b7280;
            font-size: 13px;
        }

        .footer a {
            color: #3498db;
            text-decoration: none;
        }

        .update-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; align-items: flex-start; }
            .flag-badge { align-self: flex-start; }
            .stats-grid { gap: 20px; }
            .stat-value { font-size: 20px; }
            .news-card { flex-direction: column; padding: 16px 20px; }
            .news-card.featured .news-card-title { font-size: 17px; }
            .news-card-time { white-space: normal; }
        }

        /* Loading shimmer */
        .shimmer {
            background: linear-gradient(90deg, #14171e 25%, #1a1d23 50%, #14171e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 20px;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">

            <div class="flag-badge">

</header>

<!-- Stats -->
<section class="stats-bar">

        <div class="stats-grid">

                <span class="stat-value warn">1.572</span>

            <div class="stat-item">

            </div>
            <div class="stat-item">
                <span class="stat-label">Haber Sayısı</span>
                <span class="stat-value" id="newsCount">30+</span>
            </div>
        </div>
    </div>
</section>

<!-- News Section -->
<section class="section">
    <div class="container">
        <div class="section-title">

        <div class="news-grid" id="newsGrid">

</section>

<!-- Footer -->
<footer class="footer">

</footer>

    function renderNews() {
        const grid = document.getElementById('newsGrid');
        const countBadge = document.getElementById('newsCountBadge');

        let html = '';

        newsData.forEach((item, index) => {
            const featuredClass = item.featured ? 'featured' : '';
            const featuredBadge = item.featured ? '<div class="featured-badge">⭐ Öne Çıkan</div>' : '';

            html += `
                <div class="news-card ${featuredClass}">
                    <div class="news-card-content">
                        ${featuredBadge}
                        <div class="news-card-title">
                            <a href="${item.url}" target="_blank" rel="noopener">${item.title}</a>
                        </div>
                        <div class="news-card-meta">
                            <span class="tag ${item.tagClass}">${item.tag}</span>
                            <span>•</span>
                            <span>BBC News</span>
                        </div>
                    </div>
                    <div class="news-card-time">${item.time}</div>
                </div>
            `;
        });

        grid.innerHTML = html;
        countBadge.textContent = `${newsData.length} haber`;
        document.getElementById('newsCount').textContent = newsData.length;
    }

    // Sayfa yüklendiğinde haberleri render et
    document.addEventListener('DOMContentLoaded', renderNews);
